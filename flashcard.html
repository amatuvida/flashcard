<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>영어 플래시카드 학습 앱</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'Courier New', monospace;
      --color-text-primary: #1e293b;
      --color-text-secondary: #64748b;
      --color-text-tertiary: #94a3b8;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f1f5f9;
      --color-border-primary: #94a3b8;
      --color-border-secondary: #cbd5e1;
      --color-border-tertiary: #e2e8f0;
      --border-radius-lg: 14px;
      --border-radius-md: 10px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html, body { height:100%; }
    body {
      font-family: var(--font-sans);
      background: #f7f9fc;
      color: var(--color-text-primary);
      -webkit-text-size-adjust: 100%;
    }
    .app {
      font-family: var(--font-sans);
      padding: 1.25rem 1rem;
      max-width: 680px;
      margin: 0 auto;
    }

    /* 단어장 선택 화면 */
    .pkg-title{font-size:18px;font-weight:600;color:var(--color-text-primary);margin-bottom:4px;}
    .pkg-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.25rem;}
    .pkg-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
      gap:8px;
      margin-bottom:1.25rem;
    }
    .pkg-card{
      background:var(--color-background-primary);
      border:1.5px solid var(--color-border-tertiary);
      border-radius:var(--border-radius-lg);
      padding:12px 8px;
      cursor:pointer;
      text-align:center;
      transition:transform .2s ease,border-color .2s ease;
      position:relative;
      -webkit-tap-highlight-color: transparent;
    }
    .pkg-card:active{transform:scale(0.97);}
    .pkg-card.selected{border-width:2px;}
    .pkg-card[data-id="3-1"].selected{border-color:#60a5fa;background:#eff6ff;}
    .pkg-card[data-id="3-2"].selected{border-color:#34d399;background:#ecfdf5;}
    .pkg-card[data-id="3-3"].selected{border-color:#fbbf24;background:#fffbeb;}
    .pkg-card[data-id="3-4"].selected{border-color:#a78bfa;background:#f5f3ff;}
    .pkg-card[data-id="3-5"].selected{border-color:#f87171;background:#fef2f2;}
    .pkg-card[data-id="3-6"].selected{border-color:#60a5fa;background:#eff6ff;}
    .pkg-card[data-id="3-7"].selected{border-color:#34d399;background:#ecfdf5;}
    .pkg-card[data-id="3-8"].selected{border-color:#fbbf24;background:#fffbeb;}
    .pkg-card[data-id="3-9"].selected{border-color:#a78bfa;background:#f5f3ff;}
    .pkg-card[data-id="3-10"].selected{border-color:#f87171;background:#fef2f2;}
    .pkg-card[data-id="3-11"].selected{border-color:#60a5fa;background:#eff6ff;}
    .pkg-card[data-id="3-12"].selected{border-color:#34d399;background:#ecfdf5;}
    .pkg-card[data-id="3-13"].selected{border-color:#fbbf24;background:#fffbeb;}
    .pkg-card[data-id="3-14"].selected{border-color:#a78bfa;background:#f5f3ff;}
    .pkg-card[data-id="3-15"].selected{border-color:#f87171;background:#fef2f2;}
    .pkg-card[data-id="3-16"].selected{border-color:#60a5fa;background:#eff6ff;}
    .pkg-card[data-id="3-17"].selected{border-color:#34d399;background:#ecfdf5;}
    .pkg-card[data-id="3-18"].selected{border-color:#fbbf24;background:#fffbeb;}
    .pkg-label{font-size:13px;font-weight:600;color:var(--color-text-primary);}
    .pkg-name{font-size:10px;color:var(--color-text-secondary);margin-top:2px;line-height:1.3;}
    .pkg-count{font-size:10px;color:var(--color-text-tertiary);margin-top:3px;}
    .pkg-check{display:none;position:absolute;top:6px;right:6px;width:16px;height:16px;border-radius:50%;background:#6366f1;align-items:center;justify-content:center;}
    .pkg-card.selected .pkg-check{display:flex;}
    .pkg-check i{font-size:9px;color:#fff;}
    .divider{height:0.5px;background:var(--color-border-tertiary);margin:1.25rem 0;}
    .sel-info{font-size:13px;color:var(--color-text-secondary);padding:6px 0;}
    .action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}

    /* 공통 버튼 */
    .btn{
      height:44px;
      padding:0 18px;
      border-radius:var(--border-radius-md);
      border:none;
      font-size:14px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-family:var(--font-sans);
      font-weight:600;
      color:#fff;
      transition:opacity .15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:active{opacity:.75;transform:scale(0.97);}
    .btn:disabled{opacity:.35;cursor:default;}
    .btn.primary{background:linear-gradient(135deg,#6366f1 0%,#4f46e5 100%);}
    .btn.shuffle{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);}
    .btn.back{background:linear-gradient(135deg,#64748b 0%,#475569 100%);}
    .btn.list-btn{background:linear-gradient(135deg,#8b5cf6 0%,#7c3aed 100%);}
    .btn.outline{background:transparent;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);}
    .btn.outline:active{background:var(--color-background-secondary);}
    .btn.sm{height:36px;font-size:12px;padding:0 12px;}

    /* 학습 화면 */
    .game-screen{display:none;}
    .game-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
    .game-label{font-size:13px;color:var(--color-text-secondary);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tab-row{display:flex;gap:8px;margin-bottom:1.25rem;}
    .tab-btn{
      flex:1;height:42px;font-size:13px;border:none;
      border-radius:var(--border-radius-md);cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:6px;
      font-family:var(--font-sans);font-weight:600;color:#fff;
      opacity:.45;transition:opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.word-t{background:linear-gradient(135deg,#06b6d4 0%,#0891b2 100%);}
    .tab-btn.sent-t{background:linear-gradient(135deg,#10b981 0%,#059669 100%);}
    .tab-btn.active{opacity:1;}
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
    .mode-toggle{display:flex;gap:6px;}
    .mode-btn{
      font-size:12px;padding:6px 12px;border-radius:999px;
      border:0.5px solid var(--color-border-secondary);
      background:var(--color-background-secondary);
      color:var(--color-text-secondary);
      cursor:pointer;font-family:var(--font-sans);
      -webkit-tap-highlight-color: transparent;
    }
    .mode-btn.active{background:#6366f1;color:#fff;border-color:transparent;}
    .prog-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
    .prog-track{flex:1;height:6px;background:var(--color-background-secondary);border-radius:99px;overflow:hidden;}
    .prog-fill{height:100%;background:linear-gradient(90deg,#6366f1,#a78bfa);border-radius:99px;transition:width .35s;}
    .prog-label{font-size:13px;color:var(--color-text-secondary);white-space:nowrap;min-width:52px;text-align:right;}

    /* 플래시카드 */
    .card-wrap{
      width:100%;
      max-width:480px;
      margin:0 auto 1rem;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .card{
      width:100%;
      background:var(--color-background-primary);
      border-radius:20px;
      border:2px solid #6366f1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:2rem 1.5rem;
      text-align:center;
      min-height:220px;
    }
    .card-label{font-size:11px;color:#6366f1;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;font-weight:600;}
    .card-main{font-size:20px;font-weight:500;color:var(--color-text-primary);line-height:1.45;word-break:keep-all;}
    .card-main.lg{font-size:26px;}
    .card-sub{font-size:13px;color:var(--color-text-secondary);margin-top:8px;line-height:1.5;word-break:keep-all;}
    .card-phonetic{font-size:14px;color:#a78bfa;margin-top:6px;font-family:var(--font-mono);}
    .card-hint{font-size:12px;color:var(--color-text-tertiary);margin-top:10px;padding:4px 12px;border-radius:999px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);}
    .sound-btn{
      margin-top:14px;padding:9px 18px;border-radius:999px;
      border:1.5px solid #6366f1;background:transparent;
      color:#6366f1;font-size:13px;cursor:pointer;
      display:inline-flex;align-items:center;gap:6px;
      font-family:var(--font-sans);
      -webkit-tap-highlight-color: transparent;
    }
    .flip-hint{font-size:12px;color:var(--color-text-tertiary);text-align:center;margin-bottom:.5rem;}

    /* 키보드 가이드 - 모바일 숨김 */
    .key-guide{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:1rem;}
    .key-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-tertiary);}
    .key-badge{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:20px;padding:0 6px;border:0.5px solid var(--color-border-secondary);border-radius:4px;background:var(--color-background-secondary);font-size:11px;font-family:var(--font-mono);color:var(--color-text-secondary);}

    /* 네비게이션 버튼 */
    .nav-row{display:flex;gap:8px;justify-content:center;margin-bottom:1rem;}
    .nav-row .btn{flex:1;max-width:140px;justify-content:center;}
    .list-row{text-align:center;margin-bottom:.5rem;}
    .word-list{display:none;margin-top:.75rem;}
    .word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;}
    .word-item{padding:8px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);cursor:pointer;font-size:12px;}
    .word-item .wi-en{font-weight:600;color:var(--color-text-primary);}
    .word-item .wi-ko{font-size:10px;color:var(--color-text-secondary);margin-top:2px;}
    .word-item.cur .wi-en{color:#6366f1;}

    /* 결과 화면 */
    .result-wrap{text-align:center;padding:2.5rem 1rem;}
    .result-emoji{font-size:48px;margin-bottom:14px;}
    .result-title{font-size:20px;font-weight:600;color:var(--color-text-primary);margin-bottom:8px;}
    .result-sub{font-size:14px;color:var(--color-text-secondary);margin-bottom:1.5rem;}
    .result-acts{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

    /* 스와이프 힌트 (모바일) */
    .swipe-hint{
      font-size:12px;color:var(--color-text-tertiary);
      text-align:center;margin-bottom:.75rem;
      display:none;
    }

    /* 반응형 - 태블릿 */
    @media (min-width: 600px) {
      .app { padding: 1.5rem 1.5rem; }
      .card { min-height: 260px; }
      .card-main { font-size: 22px; }
      .card-main.lg { font-size: 28px; }
      .pkg-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    }

    /* 반응형 - 모바일 */
    @media (max-width: 480px) {
      .app { padding: 1rem 0.75rem; }
      .pkg-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .action-row { gap: 6px; }
      .action-row .btn { flex: 1; justify-content: center; font-size: 13px; padding: 0 10px; }
      .nav-row .btn { height: 48px; font-size: 14px; }
      .key-guide { display: none; }
      .swipe-hint { display: block; }
      .card { min-height: 200px; padding: 1.5rem 1rem; }
      .card-main { font-size: 18px; }
      .card-main.lg { font-size: 22px; }
      .mode-btn { font-size: 11px; padding: 5px 10px; }
      .game-label { font-size: 12px; }
      .result-acts .btn { flex: 1; justify-content: center; }
    }

    /* 스크롤바 스타일 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;}
  </style>
</head>
<body>

<div class="app" role="main">
  <h2 class="sr-only">영어 플래시카드 학습 앱</h2>
  <div id="S_pkg">
    <div class="pkg-title">플래시카드 학습</div>
    <div class="pkg-sub">학습할 단어장을 선택하세요 (여러 개 선택 가능)</div>
    <div class="pkg-grid" id="pkgGrid"></div>
    <div class="divider"></div>
    <div class="sel-info" id="selInfo">선택된 단어장 없음</div>
    <div class="action-row">
      <button class="btn primary" id="btnSel" onclick="startSelected()" disabled><i class="ti ti-cards" aria-hidden="true"></i> 선택 학습</button>
      <button class="btn shuffle" onclick="startAll()"><i class="ti ti-stack" aria-hidden="true"></i> 전체 학습</button>
      <button class="btn outline" onclick="clearSel()">초기화</button>
    </div>
  </div>

  <div class="game-screen" id="S_game">
    <div class="game-header">
      <button class="btn back sm" onclick="backToPkg()"><i class="ti ti-arrow-left" aria-hidden="true"></i> 목록</button>
      <span class="game-label" id="gameLabel"></span>
    </div>
    <div class="tab-row">
      <button class="tab-btn word-t active" id="tabWord" onclick="setTab('word')"><i class="ti ti-cards" aria-hidden="true"></i> 단어 카드</button>
      <button class="tab-btn sent-t" id="tabSent" onclick="setTab('sent')"><i class="ti ti-message" aria-hidden="true"></i> 문장 카드</button>
    </div>
    <div class="top-bar">
      <span style="font-size:12px;color:var(--color-text-tertiary)" id="countLabel"></span>
      <div class="mode-toggle" id="modeToggle">
        <button class="mode-btn active" id="modeKo" onclick="setDir('ko')">뜻→단어</button>
        <button class="mode-btn" id="modeEn" onclick="setDir('en')">단어→뜻</button>
      </div>
    </div>
    <div class="prog-row">
      <div class="prog-track"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
      <span class="prog-label" id="pLabel"></span>
    </div>
    <div id="cardArea">
      <div class="card-wrap" id="cardWrap">
        <div class="card" id="card">
          <div class="card-label" id="cLabel"></div>
          <div class="card-main" id="cMain"></div>
          <div class="card-sub" id="cSub"></div>
          <div class="card-phonetic" id="cPhonetic"></div>
          <div class="card-hint" id="cHint" style="display:none"></div>
          <button class="sound-btn" id="cSound" style="display:none" onclick="speak()"><i class="ti ti-volume" aria-hidden="true"></i> 발음 듣기</button>
        </div>
      </div>
      <div class="flip-hint" id="flipHint">카드를 탭하면 뒤집힙니다</div>
      <div class="swipe-hint">← 이전 &nbsp;|&nbsp; 탭: 뒤집기 &nbsp;|&nbsp; → 다음</div>
      <div class="key-guide">
        <div class="key-item"><span class="key-badge">Space</span> 뒤집기</div>
        <div class="key-item"><span class="key-badge">→</span> 다음</div>
        <div class="key-item"><span class="key-badge">←</span> 이전</div>
      </div>
      <div class="nav-row">
        <button class="btn back" id="prevBtn" onclick="go(-1)"><i class="ti ti-arrow-left" aria-hidden="true"></i> 이전</button>
        <button class="btn shuffle" onclick="doShuffle()"><i class="ti ti-arrows-shuffle" aria-hidden="true"></i> 랜덤</button>
        <button class="btn primary" id="nextBtn" onclick="go(1)">다음 <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
      </div>
      <div class="list-row">
        <button class="btn list-btn sm" onclick="toggleList()"><i class="ti ti-list" aria-hidden="true"></i> <span id="listTxt">단어 목록 보기</span></button>
      </div>
      <div class="word-list" id="wordList"><div class="word-grid" id="wordGrid"></div></div>
    </div>
    <div id="resultArea" style="display:none">
      <div class="result-wrap">
        <div class="result-emoji">🎉</div>
        <div class="result-title" id="resTitle">완료!</div>
        <div class="result-sub" id="resSub"></div>
        <div class="result-acts">
          <button class="btn primary" onclick="restart(false)"><i class="ti ti-refresh" aria-hidden="true"></i> 처음부터</button>
          <button class="btn shuffle" onclick="restart(true)"><i class="ti ti-arrows-shuffle" aria-hidden="true"></i> 랜덤으로 다시</button>
          <button class="btn back" onclick="backToPkg()"><i class="ti ti-arrow-left" aria-hidden="true"></i> 단어장 선택</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

  {id:'3-18',label:'3-18',name:'경제·회복·다큐',words:[{word:"paste",meaning:"풀로 붙이다, (밀가루)반죽",phonetic:"/peɪst/"},{word:"sweep",meaning:"쓸다, 휩쓸다",phonetic:"/swiːp/"},{word:"selfish",meaning:"이기적인",phonetic:"/ˈsel.fɪʃ/"},{word:"selfishness",meaning:"이기적임, 제멋대로임",phonetic:"/ˈsel.fɪʃ.nəs/"},{word:"brief",meaning:"(시간이) 짧은, 잠시 동안의, 간단한",phonetic:"/briːf/"},{word:"recover",meaning:"회복하다, 회복되다",phonetic:"/rɪˈkʌv.ər/"},{word:"recovery",meaning:"회복",phonetic:"/rɪˈkʌv.ər.i/"},{word:"visible",meaning:"(눈에)보이는, 알아볼 수 있는",phonetic:"/ˈvɪz.ɪ.bəl/"},{word:"invisible",meaning:"(눈에)보이지 않는, 볼 수 없는",phonetic:"/ɪnˈvɪz.ɪ.bəl/"},{word:"stretch",meaning:"늘이다, (팔·다리를)뻗다",phonetic:"/stretʃ/"},{word:"economy",meaning:"경제, 경제상황",phonetic:"/ɪˈkɒn.ə.mi/"},{word:"economic",meaning:"경제의, 경제상의",phonetic:"/ˌiː.kəˈnɒm.ɪk/"},{word:"economical",meaning:"경제적인, 알뜰한",phonetic:"/ˌiː.kəˈnɒm.ɪ.kəl/"},{word:"delay",meaning:"지연, 지체, 연기, 미루다, 연기하다",phonetic:"/dɪˈleɪ/"},{word:"ignore",meaning:"무시하다, (사람·사물을) 못 본 척하다",phonetic:"/ɪɡˈnɔːr/"},{word:"ignorant",meaning:"무지한, 무식한",phonetic:"/ˈɪɡ.nər.ənt/"},{word:"ignorance",meaning:"무지, 무식",phonetic:"/ˈɪɡ.nər.əns/"},{word:"daily",meaning:"매일(의), 나날의",phonetic:"/ˈdeɪ.li/"},{word:"annual",meaning:"매년의, 연간의, 한 해의",phonetic:"/ˈæn.ju.əl/"},{word:"genre",meaning:"(예술 작품의)장르",phonetic:"/ˈʒɒn.rə/"},{word:"theme",meaning:"주제, 테마",phonetic:"/θiːm/"},{word:"document",meaning:"서류, 문서",phonetic:"/ˈdɒk.jʊ.mənt/"},{word:"documentary",meaning:"다큐멘터리, 기록물",phonetic:"/ˌdɒk.jʊˈmen.tər.i/"},{word:"fall over~",meaning:"~에 걸려 넘어지다",phonetic:"/fɔːl ˈoʊ.vər/"},{word:"fall ill(sick)",meaning:"병이 나다",phonetic:"/fɔːl ɪl/"}],sentences:[
      {ko:"종이를 풀로 붙여.",en:"Paste the paper with glue."},
      {ko:"바닥을 쓸었어.",en:"I swept the floor."},
      {ko:"이기적으로 행동하지 마.",en:"Don't act selfish."},
      {ko:"이기심은 나쁜 거야.",en:"Selfishness is bad."},
      {ko:"잠깐 쉬자.",en:"Let's take a brief rest."},
      {ko:"감기에서 회복됐어.",en:"I recovered from a cold."},
      {ko:"빠른 회복을 바라.",en:"I hope for a quick recovery."},
      {ko:"달이 잘 보여.",en:"The moon is visible."},
      {ko:"공기는 눈에 보이지 않아.",en:"Air is invisible."},

      {ko:"그의 말을 무시했어.",en:"I ignored what he said."},

      {ko:"무지는 위험해.",en:"Ignorance is dangerous."},
      {ko:"일기를 매일 써.",en:"I write in my diary daily."},
      {ko:"연례 축제가 열렸어.",en:"The annual festival was held."},
      {ko:"내가 좋아하는 장르는 액션이야.",en:"My favorite genre is action."},
      {ko:"이 영화의 주제는 우정이야.",en:"The theme of this movie is friendship."},
      {ko:"중요한 문서를 받았어.",en:"I received an important document."},
      {ko:"다큐멘터리를 봤어.",en:"I watched a documentary."},

let selIds=new Set(),gWords=[],gSents=[],order=[],cur=0;
let side='front',tab='word',dir='ko',animT=null,inGame=false;

function renderPkg(){
  document.getElementById('pkgGrid').innerHTML=UNITS.map(u=>`
    <div class="pkg-card" id="p_${u.id}" data-id="${u.id}" onclick="togglePkg('${u.id}')">
      <div class="pkg-check"><i class="ti ti-check" aria-hidden="true"></i></div>
      <div class="pkg-label">${u.label}</div>
      <div class="pkg-name">${u.name}</div>
      <div class="pkg-count">${u.words.length}개</div>
    </div>`).join('');
}
function togglePkg(id){
  selIds.has(id)?selIds.delete(id):selIds.add(id);
  document.querySelectorAll('.pkg-card').forEach(el=>el.classList.remove('selected'));
  selIds.forEach(id=>{const el=document.getElementById('p_'+id);if(el)el.classList.add('selected');});
  const total=[...selIds].reduce((s,id)=>s+(UNITS.find(u=>u.id===id)?.words.length||0),0);
  const btn=document.getElementById('btnSel');
  if(selIds.size===0){document.getElementById('selInfo').textContent='선택된 단어장 없음';btn.disabled=true;}
  else{const names=[...selIds].map(id=>UNITS.find(u=>u.id===id)?.label).join(', ');document.getElementById('selInfo').textContent=`${names} 선택됨 · 총 ${total}개 단어`;btn.disabled=false;}
}
function clearSel(){selIds.clear();document.querySelectorAll('.pkg-card').forEach(el=>el.classList.remove('selected'));document.getElementById('selInfo').textContent='선택된 단어장 없음';document.getElementById('btnSel').disabled=true;}
function startSelected(){launchGame([...selIds]);}
function startAll(){launchGame(UNITS.map(u=>u.id));}

function launchGame(ids){
  gWords=[];gSents=[];
  UNITS.filter(u=>ids.includes(u.id)).forEach(u=>{gWords.push(...u.words);gSents.push(...u.sentences);});
  order=[...Array(gWords.length).keys()];
  cur=0;side='front';tab='word';dir='ko';inGame=true;
  const label=UNITS.filter(u=>ids.includes(u.id)).map(u=>u.label).join(' + ');
  document.getElementById('gameLabel').textContent=label+' · '+gWords.length+'개 단어';
  document.getElementById('S_pkg').style.display='none';
  document.getElementById('S_game').style.display='block';
  document.getElementById('cardArea').style.display='block';
  document.getElementById('resultArea').style.display='none';
  setTabUI('word');
  document.getElementById('modeKo').classList.add('active');document.getElementById('modeEn').classList.remove('active');
  document.getElementById('modeToggle').style.visibility='visible';
  listOpen=false;document.getElementById('wordList').style.display='none';document.getElementById('listTxt').textContent='단어 목록 보기';
  showCard();
}
function backToPkg(){cancelAnim();inGame=false;document.getElementById('S_game').style.display='none';document.getElementById('S_pkg').style.display='block';}
function setTabUI(t){document.getElementById('tabWord').classList.toggle('active',t==='word');document.getElementById('tabSent').classList.toggle('active',t==='sent');document.getElementById('modeToggle').style.visibility=t==='word'?'visible':'hidden';}
function setTab(t){tab=t;setTabUI(t);showCard();}
function setDir(d){dir=d;document.getElementById('modeKo').classList.toggle('active',d==='ko');document.getElementById('modeEn').classList.toggle('active',d==='en');showCard();}

function getC(s){
  const w=gWords[order[cur]],se=gSents[order[cur]];
  if(tab==='word'){
    if(s==='front')return dir==='ko'?{label:'한국어 뜻',main:w.meaning,sub:'영어 단어를 맞춰보세요',ph:'',hint:'',snd:false,lg:true}:{label:'영어 단어',main:w.word,sub:w.phonetic,ph:'',hint:'',snd:false,lg:true};
    return dir==='ko'?{label:'영어 단어',main:w.word,sub:'',ph:w.phonetic,hint:'',snd:true,lg:true}:{label:'한국어 뜻',main:w.meaning,sub:'',ph:'',hint:'',snd:false,lg:true};
  }
  return s==='front'?{label:'한국어 문장',main:se.ko,sub:'영어로 말해보세요',ph:'',hint:'단어: '+w.word,snd:false,lg:false}:{label:'영어 문장',main:se.en,sub:'',ph:'',hint:'',snd:true,lg:false};
}
function applyC(c){
  document.getElementById('cLabel').textContent=c.label;
  document.getElementById('cMain').textContent=c.main;
  document.getElementById('cMain').className='card-main'+(c.lg?' lg':'');
  document.getElementById('cSub').textContent=c.sub;
  document.getElementById('cPhonetic').textContent=c.ph;
  const h=document.getElementById('cHint');
  c.hint?(h.textContent=c.hint,h.style.display='inline-block'):(h.style.display='none');
  document.getElementById('cSound').style.display=c.snd?'inline-flex':'none';
  document.getElementById('flipHint').style.visibility=side==='front'?'visible':'hidden';
  document.getElementById('countLabel').textContent=gWords.length+'개 단어';
}
function cancelAnim(){if(animT){clearTimeout(animT);animT=null;}const card=document.getElementById('card');card.style.transition='none';card.style.transform='rotateY(0deg)';}
function animSwap(nc,ns,cb){cancelAnim();const card=document.getElementById('card');card.style.transition='transform .16s ease-in';card.style.transform='rotateY(90deg)';animT=setTimeout(()=>{side=ns;applyC(nc);card.style.transition='transform .16s ease-out';card.style.transform='rotateY(0deg)';animT=setTimeout(()=>{animT=null;if(cb)cb();},160);},160);}
function flipCard(){const ns=side==='front'?'back':'front';animSwap(getC(ns),ns,()=>{if(ns==='back')speak();});}
function go(d){if(d===1&&cur===order.length-1){showResult();return;}cur=Math.max(0,Math.min(order.length-1,cur+d));side='front';animSwap(getC('front'),'front');updateMeta();}
function showCard(){cancelAnim();side='front';applyC(getC('front'));updateMeta();}
function updateMeta(){const n=order.length;document.getElementById('pFill').style.width=Math.round((cur+1)/n*100)+'%';document.getElementById('pLabel').textContent=(cur+1)+' / '+n;document.getElementById('prevBtn').disabled=cur===0;document.getElementById('nextBtn').innerHTML=cur===n-1?'<i class="ti ti-check" aria-hidden="true"></i> 완료':'다음 <i class="ti ti-arrow-right" aria-hidden="true"></i>';if(document.getElementById('wordList').style.display!=='none')renderGrid();}
function speak(){const text=tab==='sent'?gSents[order[cur]].en:gWords[order[cur]].word;if(!('speechSynthesis'in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.8;window.speechSynthesis.speak(u);}
function doShuffle(){for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}cur=0;showCard();}
function showResult(){document.getElementById('cardArea').style.display='none';document.getElementById('resultArea').style.display='block';document.getElementById('resTitle').textContent=tab==='word'?'단어 카드 완료!':'문장 카드 완료!';document.getElementById('resSub').textContent='총 '+gWords.length+'개 단어 학습 완료!';}
function restart(doShuf){order=[...Array(gWords.length).keys()];if(doShuf){for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}}cur=0;document.getElementById('resultArea').style.display='none';document.getElementById('cardArea').style.display='block';showCard();}
let listOpen=false;
function toggleList(){listOpen=!listOpen;document.getElementById('wordList').style.display=listOpen?'block':'none';document.getElementById('listTxt').textContent=listOpen?'목록 닫기':'단어 목록 보기';if(listOpen)renderGrid();}
function renderGrid(){document.getElementById('wordGrid').innerHTML=gWords.map((w,i)=>{const isCur=order[cur]===i;return `<div class="word-item${isCur?' cur':''}" onclick="jumpTo(${i})"><div class="wi-en">${w.word}</div><div class="wi-ko">${w.meaning.length>14?w.meaning.slice(0,14)+'…':w.meaning}</div></div>`;}).join('');}
function jumpTo(idx){const pos=order.indexOf(idx);if(pos!==-1){cur=pos;showCard();}}

// 클릭(탭) 카드 뒤집기
document.getElementById('cardWrap').addEventListener('click',e=>{if(e.target.closest('#cSound'))return;flipCard();});

// 키보드 단축키
document.addEventListener('keydown',e=>{if(!inGame)return;if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName))return;if(e.key===' '||e.code==='Space'){e.preventDefault();flipCard();}else if(e.key==='ArrowRight'){e.preventDefault();go(1);}else if(e.key==='ArrowLeft'){e.preventDefault();go(-1);}});

// 스와이프 제스처 (모바일/태블릿)
(function(){
  let tx=0,ty=0,swiping=false;
  const wrap=document.getElementById('cardWrap');
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    tx=e.touches[0].clientX;
    ty=e.touches[0].clientY;
    swiping=true;
  },{passive:true});
  wrap.addEventListener('touchmove',e=>{
    if(!swiping||e.touches.length!==1)return;
    const dx=Math.abs(e.touches[0].clientX-tx);
    const dy=Math.abs(e.touches[0].clientY-ty);
    if(dx>dy&&dx>10)e.preventDefault();
  },{passive:false});
  wrap.addEventListener('touchend',e=>{
    if(!swiping||!inGame)return;
    swiping=false;
    const dx=e.changedTouches[0].clientX-tx;
    const dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
      if(dx<0)go(1); else go(-1);
    }
  },{passive:true});
})();

renderPkg();
</script>
