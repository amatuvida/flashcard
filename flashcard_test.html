<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>영어 단어 학습</title>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root {
      --bg: #f0f4ff;
      --white: #ffffff;
      --indigo: #4f46e5;
      --indigo-light: #eef2ff;
      --green: #10b981;
      --green-light: #ecfdf5;
      --red: #ef4444;
      --red-light: #fef2f2;
      --yellow: #f59e0b;
      --yellow-light: #fffbeb;
      --teal: #0891b2;
      --teal-light: #e0f2fe;
      --purple: #7c3aed;
      --purple-light: #f5f3ff;
      --text: #1e293b;
      --text2: #64748b;
      --text3: #94a3b8;
      --border: #e2e8f0;
      --font: 'Pretendard', -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-text-size-adjust: 100%; }
    .wrap { max-width: 600px; margin: 0 auto; padding: 1rem 1rem 4rem; }

    /* ── 탭 네비 ── */
    .tab-nav {
      display: flex; gap: 6px; margin-bottom: 1.5rem;
      background: var(--white); border-radius: 16px; padding: 6px;
      box-shadow: 0 2px 12px rgba(79,70,229,.08);
    }
    .tab-nav button {
      flex: 1; height: 42px; border: none; border-radius: 11px;
      font-size: 13px; font-weight: 700; font-family: var(--font);
      cursor: pointer; transition: all .2s; color: var(--text3);
      background: transparent; -webkit-tap-highlight-color: transparent;
    }
    .tab-nav button.active { color: #fff; }
    .tab-nav button[data-tab="test"].active  { background: var(--indigo); }
    .tab-nav button[data-tab="dictation"].active { background: var(--teal); }
    .tab-nav button[data-tab="wordbook"].active  { background: var(--purple); }

    /* ── 공통 ── */
    .screen { display: none; }
    .screen.active { display: block; }
    .section-title { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }
    .unit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 1.25rem; }
    .unit-card {
      background: var(--white); border: 2px solid var(--border); border-radius: 12px;
      padding: 10px 6px; text-align: center; cursor: pointer;
      transition: all .2s; position: relative; -webkit-tap-highlight-color: transparent;
    }
    .unit-card:active { transform: scale(.96); }
    .unit-card.sel { border-color: var(--indigo); background: var(--indigo-light); }
    .unit-card .u-label { font-size: 13px; font-weight: 700; }
    .unit-card.sel .u-label { color: var(--indigo); }
    .unit-card .u-name { font-size: 9px; color: var(--text3); margin-top: 2px; line-height: 1.3; }
    .unit-card .u-check { display: none; position: absolute; top: 5px; right: 5px; width: 14px; height: 14px; background: var(--indigo); border-radius: 50%; align-items: center; justify-content: center; font-size: 8px; color: #fff; }
    .unit-card.sel .u-check { display: flex; }
    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
    .sel-info { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 1rem; min-height: 18px; }
    .btn {
      width: 100%; height: 48px; border-radius: 14px; border: none;
      font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-family: var(--font); transition: all .15s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(.97); opacity: .85; }
    .btn:disabled { opacity: .35; cursor: default; }
    .btn-indigo { background: var(--indigo); color: #fff; }
    .btn-teal   { background: var(--teal); color: #fff; }
    .btn-purple { background: var(--purple); color: #fff; }
    .btn-green  { background: var(--green); color: #fff; }
    .btn-yellow { background: var(--yellow); color: #fff; }
    .btn-outline { background: var(--white); border: 2px solid var(--border); color: var(--text2); }
    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }
    .btn-sm { height: 36px; font-size: 12px; width: auto; padding: 0 14px; border-radius: 10px; }
    .prog-wrap { margin-bottom: 1.25rem; }
    .prog-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .prog-lbl { font-size: 12px; color: var(--text2); font-weight: 600; }
    .prog-bar { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 99px; transition: width .4s; }
    .fill-indigo { background: linear-gradient(90deg, var(--indigo), #a78bfa); }
    .fill-teal   { background: linear-gradient(90deg, var(--teal), #06b6d4); }
    .back-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
    .back-lbl { font-size: 13px; color: var(--text2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .feedback { display: none; border-radius: 12px; padding: 11px 16px; font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 1rem; }
    .feedback.ok  { display: block; background: var(--green-light);  color: var(--green); }
    .feedback.ng  { display: block; background: var(--red-light);    color: var(--red); }
    .feedback.try { display: block; background: var(--yellow-light); color: var(--yellow); }

    /* ── 타이핑 테스트 ── */
    .q-card {
      background: var(--white); border-radius: 20px; padding: 1.75rem 1.5rem;
      text-align: center; margin-bottom: 1.25rem;
      box-shadow: 0 4px 20px rgba(79,70,229,.07);
    }
    .q-badge { display: inline-block; font-size: 11px; font-weight: 700; color: var(--indigo); background: var(--indigo-light); border-radius: 99px; padding: 3px 12px; margin-bottom: 12px; }
    .q-prompt { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
    .q-word { font-size: 26px; font-weight: 700; color: var(--text); word-break: keep-all; line-height: 1.35; }
    .q-phonetic { font-size: 13px; color: #a78bfa; margin-top: 5px; font-family: monospace; }
    .snd-btn {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 14px;
      padding: 8px 18px; border-radius: 99px; border: 2px solid var(--indigo);
      background: transparent; color: var(--indigo); font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: var(--font); -webkit-tap-highlight-color: transparent;
    }
    .snd-btn:active { background: var(--indigo-light); }
    .ans-input {
      width: 100%; height: 52px; border-radius: 14px; border: 2px solid var(--border);
      background: var(--white); font-size: 18px; font-weight: 600; text-align: center;
      font-family: var(--font); color: var(--text); outline: none; transition: border-color .2s;
      -webkit-appearance: none; margin-bottom: 1rem;
    }
    .ans-input:focus { border-color: var(--indigo); }
    .ans-input.ok  { border-color: var(--green);  background: var(--green-light);  color: var(--green); }
    .ans-input.ng  { border-color: var(--red);    background: var(--red-light);    color: var(--red); }
    .ans-input.try { border-color: var(--yellow); background: var(--yellow-light); }
    .result-card { background: var(--white); border-radius: 20px; padding: 2rem 1.5rem; text-align: center; box-shadow: 0 4px 20px rgba(79,70,229,.07); margin-bottom: 1.25rem; }
    .res-emoji  { font-size: 52px; margin-bottom: 10px; }
    .res-score  { font-size: 38px; font-weight: 800; color: var(--indigo); margin: 10px 0 4px; }
    .res-sub    { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }
    .res-list   { margin-bottom: 1.25rem; }
    .res-item   { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; margin-bottom: 5px; font-size: 13px; }
    .res-item.ok { background: var(--green-light); }
    .res-item.ng { background: var(--red-light); }
    .res-item .ri-w { font-weight: 700; flex: 1; }
    .res-item.ok .ri-w { color: var(--green); }
    .res-item.ng .ri-w { color: var(--red); }
    .res-item .ri-d { font-size: 11px; color: var(--text2); }

    /* ── 받아쓰기 ── */
    .speed-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; background: var(--white); border-radius: 14px; padding: 12px 16px; }
    .speed-row label { font-size: 13px; font-weight: 600; color: var(--text2); white-space: nowrap; }
    .speed-row input[type=range] { flex: 1; accent-color: var(--teal); }
    .speed-val { font-size: 13px; font-weight: 700; color: var(--teal); min-width: 32px; text-align: right; }
    .dict-card {
      background: var(--white); border-radius: 20px; padding: 1.75rem 1.5rem;
      text-align: center; margin-bottom: 1.25rem;
      box-shadow: 0 4px 20px rgba(8,145,178,.1);
      border: 2px solid var(--teal-light);
    }
    .dict-num { font-size: 12px; font-weight: 700; color: var(--teal); margin-bottom: 8px; }
    .dict-meaning { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; word-break: keep-all; }
    .dict-hint { font-size: 12px; color: var(--text3); }
    .dict-controls { display: flex; gap: 8px; margin-bottom: 1rem; }
    .dict-controls .btn { height: 46px; font-size: 14px; }
    .answer-sheet {
      background: var(--white); border-radius: 16px; padding: 1.25rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.05);
    }
    .answer-sheet h3 { font-size: 14px; font-weight: 700; color: var(--teal); margin-bottom: 12px; }
    .ans-table { width: 100%; border-collapse: collapse; }
    .ans-table th { font-size: 11px; color: var(--text3); font-weight: 600; padding: 4px 8px; text-align: left; border-bottom: 1px solid var(--border); }
    .ans-table td { font-size: 13px; padding: 8px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .ans-table tr:last-child td { border-bottom: none; }
    .ans-num { font-weight: 700; color: var(--text3); width: 28px; }
    .ans-ko  { color: var(--text2); }
    .ans-en  { font-weight: 700; color: var(--indigo); }
    .ans-ph  { font-size: 11px; color: #a78bfa; font-family: monospace; }

    /* ── 단어장 ── */
    .wb-unit-card { background: var(--white); border: 2px solid var(--border); border-radius: 12px; padding: 10px 6px; text-align: center; cursor: pointer; transition: all .2s; -webkit-tap-highlight-color: transparent; }
    .wb-unit-card:active { transform: scale(.96); }
    .wb-unit-card .u-label { font-size: 13px; font-weight: 700; }
    .wb-unit-card .u-name { font-size: 9px; color: var(--text3); margin-top: 2px; line-height: 1.3; }
    .flip-card-wrap { perspective: 1000px; width: 100%; margin-bottom: 1.25rem; }
    .flip-card { position: relative; width: 100%; min-height: 200px; transform-style: preserve-3d; transition: transform .45s ease; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .flip-card.flipped { transform: rotateY(180deg); }
    .flip-front, .flip-back {
      position: absolute; width: 100%; min-height: 200px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 20px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem 1.5rem; text-align: center;
    }
    .flip-front { background: var(--white); border: 2px solid var(--purple-light); box-shadow: 0 4px 20px rgba(124,58,237,.08); }
    .flip-back  { background: var(--purple-light); border: 2px solid var(--purple); transform: rotateY(180deg); box-shadow: 0 4px 20px rgba(124,58,237,.15); }
    .wb-side-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; margin-bottom: 12px; }
    .flip-front .wb-side-label { color: var(--purple); }
    .flip-back  .wb-side-label { color: var(--purple); }
    .wb-ko   { font-size: 22px; font-weight: 700; color: var(--text); word-break: keep-all; line-height: 1.4; }
    .wb-en   { font-size: 26px; font-weight: 800; color: var(--purple); }
    .wb-ph   { font-size: 14px; color: #a78bfa; margin-top: 8px; font-family: monospace; }
    .wb-hint { font-size: 12px; color: var(--text3); margin-top: 8px; }
    .wb-nav  { display: flex; gap: 8px; justify-content: center; margin-bottom: 1rem; }
    .wb-nav .btn { max-width: 140px; height: 46px; }
    .wb-prog { text-align: center; font-size: 13px; color: var(--text2); font-weight: 600; margin-bottom: 1rem; }

    @media (max-width: 400px) {
      .tab-nav button { font-size: 11px; }
      .q-word { font-size: 20px; }
      .wb-en  { font-size: 20px; }
      .wb-ko  { font-size: 18px; }
      .dict-meaning { font-size: 18px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- 탭 네비 -->
  <nav class="tab-nav">
    <button data-tab="test" class="active" onclick="switchTab('test')">✏️ 타이핑 테스트</button>
    <button data-tab="dictation" onclick="switchTab('dictation')">🎧 받아쓰기</button>
    <button data-tab="wordbook" onclick="switchTab('wordbook')">📖 단어장</button>
  </nav>

  <!-- ══════════════ 탭1: 타이핑 테스트 ══════════════ -->
  <div id="tab-test" class="screen active">

    <!-- 선택 화면 -->
    <div id="t-select">
      <div class="section-title">단원 선택</div>
      <div class="unit-grid" id="t-unitGrid"></div>
      <div class="divider"></div>
      <div class="section-title">문제 방식</div>
      <div style="display:flex;gap:8px;margin-bottom:1.25rem;">
        <div class="unit-card sel" id="tm-listen" style="flex:1;padding:14px 10px;" onclick="setTMode('listen')">
          <div style="font-size:20px;margin-bottom:4px;">🔊</div>
          <div class="u-label">듣고 쓰기</div>
          <div class="u-name">발음 듣고 영어 철자</div>
        </div>
        <div class="unit-card" id="tm-meaning" style="flex:1;padding:14px 10px;" onclick="setTMode('meaning')">
          <div style="font-size:20px;margin-bottom:4px;">🇰🇷</div>
          <div class="u-label">뜻 보고 쓰기</div>
          <div class="u-name">한국어 뜻 → 영어</div>
        </div>
      </div>
      <div class="sel-info" id="t-selInfo">단원을 선택하세요</div>
      <div class="btn-row">
        <button class="btn btn-indigo" id="t-btnStart" onclick="tStart(false)" disabled>선택 학습</button>
        <button class="btn btn-yellow" style="flex:0 0 auto;width:auto;padding:0 18px;" onclick="tStart(true)">🎲 전체</button>
      </div>
    </div>

    <!-- 테스트 진행 -->
    <div id="t-game" style="display:none">
      <div class="back-bar">
        <button class="btn btn-outline btn-sm" onclick="tBack()">← 나가기</button>
        <span class="back-lbl" id="t-gameLabel"></span>
      </div>
      <div class="prog-wrap">
        <div class="prog-top">
          <span class="prog-lbl" id="t-progLbl">1 / 25</span>
          <span class="prog-lbl" style="color:var(--indigo)" id="t-scoreLbl">✅ 0  ❌ 0</span>
        </div>
        <div class="prog-bar"><div class="prog-fill fill-indigo" id="t-progFill" style="width:0%"></div></div>
      </div>
      <div class="q-card">
        <div class="q-badge" id="t-badge"></div>
        <div class="q-prompt" id="t-prompt"></div>
        <div class="q-word" id="t-word"></div>
        <div class="q-phonetic" id="t-phonetic"></div>
        <button class="snd-btn" id="t-sndBtn" onclick="tSpeak()" style="display:none">🔊 발음 듣기</button>
      </div>
      <input class="ans-input" id="t-input" type="text" placeholder="영어 단어 입력" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" onkeydown="tKey(event)">
      <div class="feedback" id="t-feedback"></div>
      <div class="btn-row">
        <button class="btn btn-indigo" id="t-submit" onclick="tSubmit()">확인</button>
        <button class="btn btn-outline" id="t-next" onclick="tNext()" style="display:none">다음 →</button>
      </div>
      <button class="btn btn-yellow" onclick="tShuffle()" style="margin-top:8px;">🎲 순서 섞기</button>
    </div>

    <!-- 결과 -->
    <div id="t-result" style="display:none">
      <div class="result-card">
        <div class="res-emoji" id="t-resEmoji"></div>
        <div style="font-size:20px;font-weight:700;margin-bottom:6px;">테스트 완료!</div>
        <div class="res-score" id="t-resScore"></div>
        <div class="res-sub" id="t-resSub"></div>
      </div>
      <div class="res-list" id="t-resList"></div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-red" id="t-retryWrong" onclick="tRetryWrong()" style="background:var(--red);color:#fff;">❌ 틀린 문제만 다시</button>
        <button class="btn btn-yellow" onclick="tStart(true)">🎲 전체 랜덤으로 다시</button>
        <button class="btn btn-outline" onclick="tBack()">← 단원 선택으로</button>
      </div>
    </div>
  </div>

  <!-- ══════════════ 탭2: 받아쓰기 ══════════════ -->
  <div id="tab-dictation" class="screen">

    <!-- 선택 화면 -->
    <div id="d-select">
      <div class="section-title">단원 선택</div>
      <div class="unit-grid" id="d-unitGrid"></div>
      <div class="divider"></div>
      <div class="speed-row">
        <label>읽기 속도</label>
        <input type="range" id="d-speed" min="0.5" max="1.5" step="0.1" value="0.8" oninput="updateSpeed()">
        <span class="speed-val" id="d-speedVal">0.8×</span>
      </div>
      <div class="sel-info" id="d-selInfo">단원을 선택하세요</div>
      <div class="btn-row">
        <button class="btn btn-teal" id="d-btnStart" onclick="dStart(false)" disabled>선택 받아쓰기</button>
        <button class="btn btn-yellow" style="flex:0 0 auto;width:auto;padding:0 18px;" onclick="dStart(true)">🎲 전체</button>
      </div>
    </div>

    <!-- 받아쓰기 진행 -->
    <div id="d-game" style="display:none">
      <div class="back-bar">
        <button class="btn btn-outline btn-sm" onclick="dBack()">← 나가기</button>
        <span class="back-lbl" id="d-gameLabel"></span>
      </div>
      <div class="prog-wrap">
        <div class="prog-top">
          <span class="prog-lbl" id="d-progLbl">1 / 25</span>
          <span class="prog-lbl" style="color:var(--teal)">받아쓰기 중</span>
        </div>
        <div class="prog-bar"><div class="prog-fill fill-teal" id="d-progFill" style="width:0%"></div></div>
      </div>
      <div class="dict-card">
        <div class="dict-num" id="d-num"></div>
        <div class="dict-meaning" id="d-meaning"></div>
        <div class="dict-hint" id="d-hint"></div>
      </div>
      <div class="dict-controls">
        <button class="btn btn-teal" onclick="dSpeak()">🔊 다시 듣기</button>
        <button class="btn btn-outline" onclick="dPrev()" id="d-prevBtn">◀ 이전</button>
        <button class="btn btn-outline" onclick="dNext()" id="d-nextBtn">다음 ▶</button>
      </div>
      <div class="speed-row">
        <label>속도</label>
        <input type="range" id="d-speed2" min="0.5" max="1.5" step="0.1" value="0.8" oninput="updateSpeed2()">
        <span class="speed-val" id="d-speedVal2">0.8×</span>
      </div>
      <div class="btn-row" style="margin-top:4px;">
        <button class="btn btn-green" onclick="dShowAnswer()">📋 정답 확인</button>
        <button class="btn" id="d-autoBtn" onclick="dToggleAuto()" style="background:var(--purple);color:#fff;">▶ 자동재생</button>
      </div>
      <button class="btn btn-yellow" onclick="dShuffle()" style="margin-top:8px;">🎲 순서 섞기</button>
      <div style="text-align:center;font-size:11px;color:var(--text3);margin-top:12px;">
        ⌨️ <b>Space</b> 다시 듣기 &nbsp;·&nbsp; <b>←→</b> 이전/다음 &nbsp;·&nbsp; <b>Enter</b> 자동재생
      </div>
    </div>

    <!-- 정답지 -->
    <div id="d-answer" style="display:none">
      <div class="back-bar">
        <button class="btn btn-outline btn-sm" onclick="dHideAnswer()">← 돌아가기</button>
        <span class="back-lbl">📋 정답지</span>
      </div>
      <div class="answer-sheet">
        <h3>📋 정답지</h3>
        <table class="ans-table">
          <thead><tr><th>#</th><th>한국어 뜻</th><th>영어 단어</th><th>발음</th></tr></thead>
          <tbody id="d-answerBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ══════════════ 탭3: 단어장 ══════════════ -->
  <div id="tab-wordbook" class="screen">

    <!-- 단원 선택 -->
    <div id="w-select">
      <div class="section-title">단원 선택</div>
      <div class="unit-grid" id="w-unitGrid"></div>
      <div class="divider"></div>
      <div class="btn-row">

// ── 탭 전환 ──
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
}

// ── 공통 유틸 ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function normalize(s) { return s.trim().toLowerCase().replace(/[^a-z0-9\s\-]/g, '').replace(/\s+/g, ' '); }

// ── 단원 그리드 공통 렌더 ──
function renderUnitGrid(containerId, selSet, colorVar, onToggle) {
  document.getElementById(containerId).innerHTML = UNITS.map(u => `
    <div class="unit-card" id="${containerId}_${u.id}" data-id="${u.id}" onclick="${onToggle}('${u.id}')">
      <div class="u-check">✓</div>
      <div class="u-label">${u.label}</div>
      <div class="u-name">${u.name}</div>
    </div>`).join('');
}

//  탭1: 타이핑 테스트
// ══════════════════════════════
let tSelUnits = new Set();
let tMode = 'listen';
let tQs = [], tCur = 0, tCorrect = 0, tWrong = 0, tResults = [], tAttempts = 0;

renderUnitGrid('t-unitGrid', tSelUnits, '--indigo', 'tToggle');

function tToggle(id) {
  tSelUnits.has(id) ? tSelUnits.delete(id) : tSelUnits.add(id);
  document.querySelectorAll('#t-unitGrid .unit-card').forEach(el => el.classList.remove('sel'));
  tSelUnits.forEach(id => document.querySelector(`#t-unitGrid [data-id="${id}"]`)?.classList.add('sel'));
  const total = [...tSelUnits].reduce((s, id) => s + (UNITS.find(u => u.id === id)?.words.length || 0), 0);
  document.getElementById('t-btnStart').disabled = tSelUnits.size === 0;
  document.getElementById('t-selInfo').textContent = tSelUnits.size === 0 ? '단원을 선택하세요' : `${[...tSelUnits].map(id => UNITS.find(u=>u.id===id)?.label).join(', ')} · 총 ${total}개`;
}

function setTMode(m) {
  tMode = m;
  document.getElementById('tm-listen').classList.toggle('sel', m === 'listen');
  document.getElementById('tm-meaning').classList.toggle('sel', m === 'meaning');
}

function tStart(all) {
  const ids = all ? UNITS.map(u => u.id) : [...tSelUnits];
  let words = [];
  UNITS.filter(u => ids.includes(u.id)).forEach(u => words.push(...u.words));
  tQs = shuffle(words); tCur = 0; tCorrect = 0; tWrong = 0; tResults = []; tAttempts = 0;
  const lbl = all ? `전체 ${tQs.length}개 랜덤` : `${ids.map(id=>UNITS.find(u=>u.id===id)?.label).join('+')} · ${tQs.length}개`;
  document.getElementById('t-gameLabel').textContent = lbl;
  document.getElementById('t-select').style.display = 'none';
  document.getElementById('t-game').style.display = 'block';
  document.getElementById('t-result').style.display = 'none';
  tShowQ();
}

function tBack() {
  document.getElementById('t-select').style.display = 'block';
  document.getElementById('t-game').style.display = 'none';
  document.getElementById('t-result').style.display = 'none';
}

function tShowQ() {
  const w = tQs[tCur]; tAttempts = 0;
  const n = tQs.length;
  document.getElementById('t-progLbl').textContent = `${tCur + 1} / ${n}`;
  document.getElementById('t-scoreLbl').textContent = `✅ ${tCorrect}  ❌ ${tWrong}`;
  document.getElementById('t-progFill').style.width = Math.round(tCur / n * 100) + '%';
  if (tMode === 'listen') {
    document.getElementById('t-badge').textContent = '🔊 듣고 쓰기';
    document.getElementById('t-prompt').textContent = '발음을 듣고 영어 단어를 입력하세요';
    document.getElementById('t-word').textContent = '';
    document.getElementById('t-phonetic').textContent = '';
    document.getElementById('t-sndBtn').style.display = 'inline-flex';
    setTimeout(tSpeak, 300);
  } else {
    document.getElementById('t-badge').textContent = '🇰🇷 뜻 보고 쓰기';
    document.getElementById('t-prompt').textContent = '한국어 뜻을 보고 영어 단어를 입력하세요';
    document.getElementById('t-word').textContent = w.meaning;
    document.getElementById('t-phonetic').textContent = '';
    document.getElementById('t-sndBtn').style.display = 'none';
  }
  const inp = document.getElementById('t-input');
  inp.value = ''; inp.className = 'ans-input'; inp.disabled = false;
  document.getElementById('t-feedback').className = 'feedback';
  document.getElementById('t-submit').style.display = '';
  document.getElementById('t-next').style.display = 'none';
  setTimeout(() => inp.focus(), 100);
}

function tSpeak() {
  const w = tQs[tCur];
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(w.word); u.lang = 'en-US'; u.rate = 0.8;
  window.speechSynthesis.speak(u);
}

function tKey(e) {
  if (e.key === 'Enter') { document.getElementById('t-next').style.display !== 'none' ? tNext() : tSubmit(); }
}

function tSubmit() {
  const w = tQs[tCur];
  const inp = document.getElementById('t-input');
  if (!inp.value.trim()) { inp.focus(); return; }
  const correct = [w.word, ...w.word.split('/').map(s => s.trim())].map(normalize).includes(normalize(inp.value));
  const fb = document.getElementById('t-feedback');
  if (correct) {
    inp.className = 'ans-input ok'; fb.className = 'feedback ok';
    fb.textContent = `⭕ 정답! "${w.word}" ${w.phonetic}`;
    tCorrect++; tResults.push({ word: w, ans: inp.value, ok: true });
    inp.disabled = true;
    document.getElementById('t-submit').style.display = 'none';
    document.getElementById('t-next').style.display = '';
    setTimeout(tNext, 1200);
  } else {
    tAttempts++;
    if (tAttempts === 1) {
      inp.className = 'ans-input try'; inp.value = '';
      fb.className = 'feedback try';
      fb.textContent = `🔄 다시 한번! 힌트: "${w.word[0]}${'_'.repeat(Math.max(0, w.word.length - 1))}"`;
      if (tMode === 'listen') setTimeout(tSpeak, 300);
      inp.focus();
    } else {
      inp.className = 'ans-input ng'; inp.disabled = true;
      fb.className = 'feedback ng'; fb.textContent = `❌ 정답: "${w.word}" (${w.meaning})`;
      tWrong++; tResults.push({ word: w, ans: inp.value, ok: false });
      document.getElementById('t-submit').style.display = 'none';
      document.getElementById('t-next').style.display = '';
      setTimeout(tNext, 1800);
    }
  }
}

function tNext() {
  tCur++;
  if (tCur >= tQs.length) tShowResult();
  else tShowQ();
}

function tShowResult() {
  document.getElementById('t-game').style.display = 'none';
  document.getElementById('t-result').style.display = 'block';
  const total = tResults.length, pct = Math.round(tCorrect / total * 100);
  document.getElementById('t-resEmoji').textContent = pct === 100 ? '🏆' : pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '💪';
  document.getElementById('t-resScore').textContent = `${tCorrect} / ${total}`;
  document.getElementById('t-resSub').textContent = `정답률 ${pct}% · ${pct===100?'완벽!':pct>=80?'잘했어요!':pct>=60?'조금 더 연습!':'다시 도전!'}`;
  document.getElementById('t-resList').innerHTML = tResults.map(r =>
    `<div class="res-item ${r.ok?'ok':'ng'}">
      <span>${r.ok?'⭕':'❌'}</span>
      <span class="ri-w">${r.word.word}</span>
      <span class="ri-d">${r.ok ? r.word.meaning : `내 답: ${r.ans} → 정답: ${r.word.word}`}</span>
    </div>`).join('');
  const wc = tResults.filter(r => !r.ok).length;
  document.getElementById('t-retryWrong').style.display = wc > 0 ? '' : 'none';
}

function tRetryWrong() {
  tQs = shuffle(tResults.filter(r => !r.ok).map(r => r.word));
  tCur = 0; tCorrect = 0; tWrong = 0; tResults = []; tAttempts = 0;
  document.getElementById('t-gameLabel').textContent = `오답 재시험 · ${tQs.length}개`;
  document.getElementById('t-result').style.display = 'none';
  document.getElementById('t-game').style.display = 'block';
  tShowQ();
}

function tShuffle() {
  tQs = shuffle(tQs); tCur = 0; tCorrect = 0; tWrong = 0; tResults = []; tAttempts = 0;
  document.getElementById('t-result').style.display = 'none';
  tShowQ();
}

  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  // 한국어 뜻 읽기 (~, 괄호 내용 등 제거)
  const text = w.meaning.replace(/~/g, '').replace(/\(.*?\)/g, '').trim();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = dSpeed;
  window.speechSynthesis.speak(u);
}

function dPrev() { dStopAuto(); if (dCur > 0) { dCur--; dShowWord(); setTimeout(dSpeak, 300); } }
function dNext() {
  dStopAuto();
  if (dCur < dWords.length - 1) { dCur++; dShowWord(); setTimeout(dSpeak, 300); }
  else dShowAnswer();
}

function dShowAnswer() {
  window.speechSynthesis.cancel();
  document.getElementById('d-game').style.display = 'none';
  document.getElementById('d-answer').style.display = 'block';
  document.getElementById('d-answerBody').innerHTML = dWords.map((w, i) =>
    `<tr>
      <td class="ans-num">${i + 1}</td>
      <td class="ans-ko">${w.meaning}</td>
      <td class="ans-en">${w.word}</td>
      <td class="ans-ph">${w.phonetic}</td>
    </tr>`).join('');
}

function dHideAnswer() {
  document.getElementById('d-answer').style.display = 'none';
  document.getElementById('d-game').style.display = 'block';
}

function dShuffle() {
  dStopAuto();
  dWords = shuffle(dWords); dCur = 0;
  dShowWord(); setTimeout(dSpeak, 300);
}

function dToggleAuto() {
  if (dAutoPlay) dStopAuto();
  else dStartAuto();
}

function dStartAuto() {
  dAutoPlay = true;
  document.getElementById('d-autoBtn').textContent = '⏹ 멈추기';
  document.getElementById('d-autoBtn').style.background = 'var(--red)';
  dAutoStep();
}

function dStopAuto() {
  dAutoPlay = false;
  if (dAutoTimer) { clearTimeout(dAutoTimer); dAutoTimer = null; }
  const btn = document.getElementById('d-autoBtn');
  if (btn) { btn.textContent = '▶ 자동재생'; btn.style.background = 'var(--purple)'; }
}

function dAutoStep() {
  if (!dAutoPlay) return;
  dShowWord();
  // 단어 뜻 읽기
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const w = dWords[dCur];
  const text = w.meaning.replace(/~/g, '').replace(/\(.*?\)/g, '').trim();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = dSpeed;
  u.onend = () => {
    if (!dAutoPlay) return;
    // 속도가 빠를수록 텀 짧게: 기본 글자당 1000ms, 속도로 나눔. 최소 600ms
    const waitMs = Math.max(600, Math.round(w.word.length * 1000 / dSpeed));
    dAutoTimer = setTimeout(() => {
      if (!dAutoPlay) return;
      if (dCur < dWords.length - 1) { dCur++; dAutoStep(); }
      else { dStopAuto(); dShowAnswer(); }
    }, waitMs);
  };
  window.speechSynthesis.speak(u);
}

// ══════════════════════════════
//  탭3: 단어장
// ══════════════════════════════
let wSelUnit = null;
let wWords = [], wCur = 0, wFlipped = false;

renderUnitGrid('w-unitGrid', null, '--purple', 'wToggle');

function wToggle(id) {
  wSelUnit = (wSelUnit === id) ? null : id;
  document.querySelectorAll('#w-unitGrid .unit-card').forEach(el => el.classList.remove('sel'));
  if (wSelUnit) document.querySelector(`#w-unitGrid [data-id="${wSelUnit}"]`)?.classList.add('sel');
  document.getElementById('w-btnStart').disabled = !wSelUnit;
}

function wStart(all) {
  if (all) {
    wWords = [];
    UNITS.forEach(u => wWords.push(...u.words));
    wWords = shuffle(wWords);
    document.getElementById('w-gameLabel').textContent = `전체 ${wWords.length}개 단어`;
  } else {
    const unit = UNITS.find(u => u.id === wSelUnit);
    wWords = [...unit.words];
    document.getElementById('w-gameLabel').textContent = `${unit.label} ${unit.name} · ${unit.words.length}개`;
  }
  wCur = 0; wFlipped = false;
  document.getElementById('w-select').style.display = 'none';
  document.getElementById('w-game').style.display = 'block';
  wShowCard();
}

function wBack() {
  document.getElementById('w-select').style.display = 'block';
  document.getElementById('w-game').style.display = 'none';
}

function wShowCard() {
  const w = wWords[wCur], n = wWords.length;
  wFlipped = false;
  document.getElementById('w-card').classList.remove('flipped');
  document.getElementById('w-ko').textContent = w.meaning;
  document.getElementById('w-en').textContent = w.word;
  document.getElementById('w-ph').textContent = w.phonetic;
  document.getElementById('w-prog').textContent = `${wCur + 1} / ${n}`;
  document.getElementById('w-prev').disabled = wCur === 0;
  document.getElementById('w-next').textContent = wCur === n - 1 ? '✅ 완료' : '다음 ▶';
}

function wFlip() {
  wFlipped = !wFlipped;
  document.getElementById('w-card').classList.toggle('flipped', wFlipped);
  if (wFlipped) setTimeout(wSpeak, 350);
}

function wSpeak() {
  const w = wWords[wCur];
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(w.word);
  u.lang = 'en-US'; u.rate = 0.8;
  window.speechSynthesis.speak(u);
}

function wGo(d) {
  if (d === 1 && wCur === wWords.length - 1) { wBack(); return; }
  wCur = Math.max(0, Math.min(wWords.length - 1, wCur + d));
  wShowCard();
}

function wShuffle() {
  wWords = shuffle(wWords); wCur = 0; wShowCard();
}

// 스와이프 (단어장)
(function() {
  let tx = 0;
  const card = document.getElementById('w-card');
  card.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
  card.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 50) { if (dx < 0) wGo(1); else wGo(-1); }
    else wFlip();
  }, { passive: true });
})();

// ── 키보드 단축키 ──
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  if (['INPUT', 'TEXTAREA', 'SELECT'].includes(tag)) return;

  const activeTab = document.querySelector('.tab-nav button.active')?.dataset.tab;

  // 탭1: 타이핑 테스트 — 입력창에 포커스 있을 때만 Enter 처리 (tKey로 이미 처리됨)

  // 탭2: 받아쓰기
  if (activeTab === 'dictation') {
    const gameVisible = document.getElementById('d-game').style.display !== 'none';
    if (!gameVisible) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); dNext(); }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); dPrev(); }
    else if (e.key === ' ') { e.preventDefault(); dSpeak(); }
    else if (e.key === 'Enter') { e.preventDefault(); dToggleAuto(); }
  }

  // 탭3: 단어장
  if (activeTab === 'wordbook') {
    const gameVisible = document.getElementById('w-game').style.display !== 'none';
    if (!gameVisible) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); wGo(1); }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); wGo(-1); }
    else if (e.key === ' ') { e.preventDefault(); wFlip(); }
  }
});
</script>
